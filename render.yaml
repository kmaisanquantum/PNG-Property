# render.yaml — Render Infrastructure Blueprint
# Split deployment: FastAPI Web Service and React Static Site

services:
  # ── FastAPI Web Service ─────────────────────────────────────────────────────
  - type: web
    name: png-property-api
    runtime: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /api/health
    autoDeploy: true

    disk:
      name: png-data
      mountPath: /app/data
      sizeGB: 1

    envVars:
      - key: PORT
        value: "8000"
      - key: MONGODB_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: FB_EMAIL
        sync: false
      - key: FB_PASSWORD
        sync: false
      - key: FB_SESSION_PATH
        value: /app/data/fb_session.json
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: OUTPUT_FILE
        value: /app/data/png_listings_latest.json

  # ── React Static Site ───────────────────────────────────────────────────────
  - type: static
    name: png-property-dashboard
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: png-property-api
          property: url
