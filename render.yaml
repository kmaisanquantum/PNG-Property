# render.yaml — Render Infrastructure Blueprint
# Unified deployment: FastAPI backend serving React frontend via Docker

services:
  - type: web
    name: png-property-api
    runtime: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /api/health
    autoDeploy: true

    envVars:
      - key: PORT
        value: "8000"
      - key: MONGODB_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: FB_EMAIL
        sync: false
      - key: FB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: OUTPUT_FILE
        value: output/png_listings_latest.json
